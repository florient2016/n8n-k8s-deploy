---
# =============================================================================
# ServiceAccount for n8n pods
# Used by Vault Agent Injector to authenticate with Vault via Kubernetes auth
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: n8n-sa
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/component: serviceaccount
  annotations:
    # Vault Agent will use this service account token to authenticate
    vault.hashicorp.com/agent-inject: "true"

---
# =============================================================================
# ClusterRoleBinding: Allow n8n SA to perform token review
# Required by Vault Kubernetes auth backend
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: n8n-vault-token-review
  labels:
    app.kubernetes.io/name: n8n
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: n8n-sa
    namespace: n8n

---
# =============================================================================
# Role: Allow n8n pods to read their own secrets (created by Vault Agent)
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: n8n-secret-reader
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: n8n-secret-reader
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: n8n-secret-reader
subjects:
  - kind: ServiceAccount
    name: n8n-sa
    namespace: n8n