---
# =============================================================================
# n8n Ingress — HTTPS with TLS termination
# Uses cert-manager (Let's Encrypt) for automatic certificate management.
# Change annotations to match your ingress controller (nginx shown here).
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: n8n-ingress
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/component: ingress
  annotations:
    # ── nginx ingress ─────────────────────────────────────────────────────────
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"

    # ── cert-manager (Let's Encrypt) ─────────────────────────────────────────
    # Use letsencrypt-prod once tested; letsencrypt-staging for initial testing
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # ── WebSocket support (required by n8n) ──────────────────────────────────
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  tls:
    - hosts:
        - n8n.example.com    # ← Change to your domain
      secretName: n8n-tls-secret
  rules:
    - host: n8n.example.com  # ← Change to your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: n8n
                port:
                  number: 80

---
# =============================================================================
# ClusterIssuer for cert-manager (Let's Encrypt)
# Only apply if cert-manager is installed in your cluster.
# =============================================================================
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: your-email@example.com   # ← Change to your email
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
