---
# =============================================================================
# n8n Worker Deployment
# Workers execute workflow jobs pulled from the Redis queue.
# Scale replicas to handle concurrent executions.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-worker
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/component: worker
spec:
  replicas: 2   # Scale this based on workload; start with 2
  selector:
    matchLabels:
      app: n8n
      role: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: n8n
        role: worker
        app.kubernetes.io/name: n8n
        app.kubernetes.io/component: worker
      annotations:
        # ── Vault Agent Injector (identical secret set as main) ──────────────
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "n8n"

        vault.hashicorp.com/agent-inject-secret-core: "secret/data/n8n/core"
        vault.hashicorp.com/agent-inject-template-core: |
          {{- with secret "secret/data/n8n/core" -}}
          export N8N_ENCRYPTION_KEY="{{ .Data.data.N8N_ENCRYPTION_KEY }}"
          {{- end }}

        vault.hashicorp.com/agent-inject-secret-postgres: "secret/data/n8n/postgres"
        vault.hashicorp.com/agent-inject-template-postgres: |
          {{- with secret "secret/data/n8n/postgres" -}}
          export DB_POSTGRESDB_PASSWORD="{{ .Data.data.POSTGRES_PASSWORD }}"
          {{- end }}

        vault.hashicorp.com/agent-inject-secret-redis: "secret/data/n8n/redis"
        vault.hashicorp.com/agent-inject-template-redis: |
          {{- with secret "secret/data/n8n/redis" -}}
          export QUEUE_BULL_REDIS_PASSWORD="{{ .Data.data.REDIS_PASSWORD }}"
          {{- end }}

        vault.hashicorp.com/agent-inject-secret-smtp: "secret/data/n8n/smtp"
        vault.hashicorp.com/agent-inject-template-smtp: |
          {{- with secret "secret/data/n8n/smtp" -}}
          export N8N_SMTP_USER="{{ .Data.data.SMTP_USER }}"
          export N8N_SMTP_PASS="{{ .Data.data.SMTP_PASSWORD }}"
          export N8N_SMTP_SENDER="{{ .Data.data.SMTP_FROM }}"
          {{- end }}

        vault.hashicorp.com/agent-inject-secret-llm: "secret/data/n8n/llm"
        vault.hashicorp.com/agent-inject-template-llm: |
          {{- with secret "secret/data/n8n/llm" -}}
          export LLM_API_KEY="{{ .Data.data.LLM_API_KEY }}"
          {{- end }}

        vault.hashicorp.com/agent-pre-populate-only: "true"
    spec:
      serviceAccountName: n8n-sa
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: wait-for-n8n-main
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              until nc -z n8n.n8n.svc.cluster.local 80; do
                echo "Waiting for n8n main instance..."
                sleep 3
              done
              echo "n8n main is ready. Starting worker."
      containers:
        - name: n8n-worker
          image: n8nio/n8n:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              # Source all Vault-injected secrets
              for f in /vault/secrets/*; do
                [ -f "$f" ] && . "$f"
              done
              # Start n8n in worker mode
              exec n8n worker
          envFrom:
            - configMapRef:
                name: n8n-config
          env:
            # Workers don't need the webhook URL
            - name: WEBHOOK_URL
              value: ""
          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n
              readOnly: true
            - name: vault-secrets
              mountPath: /vault/secrets
              readOnly: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "ps aux | grep '[n]8n worker' || exit 1"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: n8n-data
          persistentVolumeClaim:
            claimName: n8n-data-pvc
        - name: vault-secrets
          emptyDir: {}

---
# =============================================================================
# n8n Worker HorizontalPodAutoscaler
# Auto-scales workers based on CPU/memory pressure
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: n8n-worker-hpa
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/component: worker-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: n8n-worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
