---
# =============================================================================
# Redis ConfigMap
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: n8n-redis-config
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n-redis
data:
  redis.conf: |
    bind 0.0.0.0
    protected-mode yes
    port 6379
    appendonly yes
    appendfilename "appendonly.aof"
    appendfsync everysec
    maxmemory 256mb
    maxmemory-policy allkeys-lru
    timeout 300
    tcp-keepalive 60
    loglevel notice
    dir /data

---
# =============================================================================
# Redis Deployment
# Password sourced from Vault-injected file at startup
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-redis
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n-redis
    app.kubernetes.io/component: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n-redis
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: n8n-redis
        app.kubernetes.io/name: n8n-redis
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "n8n"
        vault.hashicorp.com/agent-pre-populate-only: "true"
        vault.hashicorp.com/agent-inject-secret-redis: "secret/data/n8n/redis"
        vault.hashicorp.com/agent-inject-file-redis: "redis-password"
        vault.hashicorp.com/agent-inject-template-redis: |
          {{- with secret "secret/data/n8n/redis" -}}
          {{ .Data.data.password }}
          {{- end }}
    spec:
      serviceAccountName: n8n-sa
      securityContext:
        fsGroup: 999
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              for i in $(seq 1 30); do
                [ -f /vault/secrets/redis-password ] && break
                echo "Waiting for Vault secret... ($i)"
                sleep 2
              done
              REDIS_PASSWORD=$(cat /vault/secrets/redis-password | tr -d '[:space:]')
              exec redis-server /etc/redis/redis.conf --requirepass "$REDIS_PASSWORD"
          ports:
            - name: redis
              containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: n8n-redis-data
              mountPath: /data
            - name: redis-config
              mountPath: /etc/redis
            - name: vault-secrets
              mountPath: /vault/secrets
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  PASS=$(cat /vault/secrets/redis-password | tr -d '[:space:]')
                  redis-cli -a "$PASS" ping 2>/dev/null | grep -q PONG
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  PASS=$(cat /vault/secrets/redis-password | tr -d '[:space:]')
                  redis-cli -a "$PASS" ping 2>/dev/null | grep -q PONG
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 5
      volumes:
        - name: n8n-redis-data
          persistentVolumeClaim:
            claimName: n8n-redis-pvc
        - name: redis-config
          configMap:
            name: n8n-redis-config
        - name: vault-secrets
          emptyDir:
            medium: Memory

---
# =============================================================================
# Redis Service — ClusterIP
# Get IP after apply: kubectl get svc n8n-redis-svc -n n8n -o jsonpath='{.spec.clusterIP}'
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: n8n-redis-svc
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n-redis
    app.kubernetes.io/component: cache
spec:
  selector:
    app: n8n-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  type: ClusterIP
