---
# =============================================================================
# StorageClass: standard (local volume on /n8n)
# Production note: Replace with your cloud provider's storage class in
# cloud environments (e.g., gp3 on AWS, premium-rwo on GKE)
# =============================================================================
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: standard
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/component: storage
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
allowVolumeExpansion: true

---
# =============================================================================
# PersistentVolume: n8n-data-pv
# Local mount on /n8n/n8n-data on the node
# =============================================================================
apiVersion: v1
kind: PersistentVolume
metadata:
  name: n8n-data-pv
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/component: storage
    type: n8n-data
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: standard
  local:
    path: /n8n/n8n-data
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: Exists

---
# =============================================================================
# PersistentVolume: n8n-postgres-pv
# Local mount on /n8n/postgres on the node
# =============================================================================
apiVersion: v1
kind: PersistentVolume
metadata:
  name: n8n-postgres-pv
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/component: storage
    type: n8n-postgres
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: standard
  local:
    path: /n8n/postgres
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: Exists

---
# =============================================================================
# PersistentVolume: n8n-redis-pv
# Local mount on /n8n/redis on the node
# =============================================================================
apiVersion: v1
kind: PersistentVolume
metadata:
  name: n8n-redis-pv
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/component: storage
    type: n8n-redis
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: standard
  local:
    path: /n8n/redis
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: Exists

---
# =============================================================================
# PersistentVolumeClaim: n8n-data-pvc
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-data-pvc
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 5Gi
  selector:
    matchLabels:
      type: n8n-data

---
# =============================================================================
# PersistentVolumeClaim: n8n-postgres-pvc
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-postgres-pvc
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 10Gi
  selector:
    matchLabels:
      type: n8n-postgres

---
# =============================================================================
# PersistentVolumeClaim: n8n-redis-pvc
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-redis-pvc
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 2Gi
  selector:
    matchLabels:
      type: n8n-redis