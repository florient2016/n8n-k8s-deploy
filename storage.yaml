---
# =============================================================================
# StorageClass: standard
# Uses local hostPath provisioner — no external CSI driver required.
# volumeBindingMode: Immediate  ← required when PVCs use label selectors
# =============================================================================
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: standard
  labels:
    app.kubernetes.io/name: n8n
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: Immediate
reclaimPolicy: Retain
allowVolumeExpansion: true

---
# =============================================================================
# PersistentVolume: n8n-data-pv  → hostPath /n8n/n8n-data
# hostPath PVs bind immediately with no nodeAffinity conflicts.
# type: DirectoryOrCreate creates the path on the node automatically.
# =============================================================================
apiVersion: v1
kind: PersistentVolume
metadata:
  name: n8n-data-pv
  labels:
    pv-type: n8n-data
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: standard
  hostPath:
    path: /n8n/n8n-data
    type: DirectoryOrCreate

---
# =============================================================================
# PersistentVolume: n8n-postgres-pv  → hostPath /n8n/postgres
# =============================================================================
apiVersion: v1
kind: PersistentVolume
metadata:
  name: n8n-postgres-pv
  labels:
    pv-type: n8n-postgres
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: standard
  hostPath:
    path: /n8n/postgres
    type: DirectoryOrCreate

---
# =============================================================================
# PersistentVolume: n8n-redis-pv  → hostPath /n8n/redis
# =============================================================================
apiVersion: v1
kind: PersistentVolume
metadata:
  name: n8n-redis-pv
  labels:
    pv-type: n8n-redis
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: standard
  hostPath:
    path: /n8n/redis
    type: DirectoryOrCreate

---
# =============================================================================
# PVC: n8n-data-pvc  — binds to n8n-data-pv via label selector
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-data-pvc
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 5Gi
  selector:
    matchLabels:
      pv-type: n8n-data

---
# =============================================================================
# PVC: n8n-postgres-pvc  — binds to n8n-postgres-pv
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-postgres-pvc
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 10Gi
  selector:
    matchLabels:
      pv-type: n8n-postgres

---
# =============================================================================
# PVC: n8n-redis-pvc  — binds to n8n-redis-pv
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-redis-pvc
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 2Gi
  selector:
    matchLabels:
      pv-type: n8n-redis
