---
# PostgreSQL StatefulSet
# Secrets are injected via Vault Agent sidecar annotations.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: n8n
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: n8n
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: n8n
      annotations:
        # ── Vault Agent Injector annotations ──────────────────────────────────
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "n8n-role"
        vault.hashicorp.com/agent-inject-secret-postgres-env: "secret/data/n8n/postgres"
        vault.hashicorp.com/agent-inject-template-postgres-env: |
          {{- with secret "secret/data/n8n/postgres" -}}
          export POSTGRES_PASSWORD="{{ .Data.data.password }}"
          export POSTGRES_USER="n8n"
          export POSTGRES_DB="n8n"
          {{- end }}
        vault.hashicorp.com/agent-inject-file-postgres-env: "postgres.env"
        vault.hashicorp.com/agent-pre-populate-only: "true"
    spec:
      serviceAccountName: n8n-sa
      initContainers:
        - name: vault-env-loader
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              # Wait for Vault Agent to write secrets
              until [ -f /vault/secrets/postgres.env ]; do
                echo "Waiting for vault secrets..."; sleep 2
              done
              cp /vault/secrets/postgres.env /shared-env/postgres.env
          volumeMounts:
            - name: vault-secrets
              mountPath: /vault/secrets
            - name: shared-env
              mountPath: /shared-env
      containers:
        - name: postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              set -a
              . /shared-env/postgres.env
              set +a
              exec docker-entrypoint.sh postgres
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: n8n-postgres-storage
              mountPath: /var/lib/postgresql/data
            - name: shared-env
              mountPath: /shared-env
            - name: vault-secrets
              mountPath: /vault/secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "n8n", "-d", "n8n"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "n8n", "-d", "n8n"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: n8n-postgres-storage
          persistentVolumeClaim:
            claimName: n8n-postgres-pvc
        - name: vault-secrets
          emptyDir:
            medium: Memory
        - name: shared-env
          emptyDir:
            medium: Memory
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: n8n
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: n8n
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  type: ClusterIP   # Headless for StatefulSet DNS
