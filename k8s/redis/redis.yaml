---
# Redis ConfigMap (non-sensitive settings)
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: n8n
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: n8n
data:
  redis.conf: |
    # Network
    bind 0.0.0.0
    port 6379
    protected-mode yes

    # Persistence (RDB)
    save 900 1
    save 300 10
    save 60 10000
    dbfilename dump.rdb
    dir /data

    # AOF for durability
    appendonly yes
    appendfilename "appendonly.aof"
    appendfsync everysec

    # Memory policy for queue workloads
    maxmemory 512mb
    maxmemory-policy allkeys-lru

    # Logging
    loglevel notice
    logfile ""

    # Slowlog
    slowlog-log-slower-than 10000
    slowlog-max-len 128
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: n8n
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: n8n
spec:
  serviceName: redis-service
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: n8n
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "n8n-role"
        vault.hashicorp.com/agent-inject-secret-redis: "secret/data/n8n/redis"
        vault.hashicorp.com/agent-inject-template-redis: |
          {{- with secret "secret/data/n8n/redis" -}}
          {{ .Data.data.password }}
          {{- end }}
        vault.hashicorp.com/agent-inject-file-redis: "redis-password"
        vault.hashicorp.com/agent-pre-populate-only: "true"
    spec:
      serviceAccountName: n8n-sa
      initContainers:
        - name: vault-env-loader
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until [ -f /vault/secrets/redis-password ]; do
                echo "Waiting for vault secret..."; sleep 2
              done
              cp /vault/secrets/redis-password /shared/redis-password
          volumeMounts:
            - name: vault-secrets
              mountPath: /vault/secrets
            - name: shared
              mountPath: /shared
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - sh
            - -c
            - |
              REDIS_PASS=$(cat /shared/redis-password)
              exec redis-server /etc/redis/redis.conf --requirepass "$REDIS_PASS"
          ports:
            - containerPort: 6379
              name: redis
          volumeMounts:
            - name: redis-config
              mountPath: /etc/redis
            - name: n8n-redis-storage
              mountPath: /data
            - name: vault-secrets
              mountPath: /vault/secrets
            - name: shared
              mountPath: /shared
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$(cat /shared/redis-password)" ping | grep PONG
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a "$(cat /shared/redis-password)" ping | grep PONG
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: redis-config
          configMap:
            name: redis-config
        - name: n8n-redis-storage
          persistentVolumeClaim:
            claimName: n8n-redis-pvc
        - name: vault-secrets
          emptyDir:
            medium: Memory
        - name: shared
          emptyDir:
            medium: Memory
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: n8n
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: n8n
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  type: ClusterIP
