---
# n8n Main Instance (webhook + UI)
# Vault Agent injects secrets as env-file at /vault/secrets/n8n.env
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-main
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/component: main
    app.kubernetes.io/part-of: n8n
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
      component: main
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: n8n
        component: main
        app.kubernetes.io/name: n8n
        app.kubernetes.io/part-of: n8n
      annotations:
        # ── Vault Agent Injector ──────────────────────────────────────────────
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "n8n-role"

        # Render all n8n secrets into a single env file
        vault.hashicorp.com/agent-inject-secret-n8n-env: "secret/data/n8n/encryption"
        vault.hashicorp.com/agent-inject-template-n8n-env: |
          {{- with secret "secret/data/n8n/encryption" -}}
          export N8N_ENCRYPTION_KEY="{{ .Data.data.key }}"
          {{- end }}
          {{- with secret "secret/data/n8n/postgres" -}}
          export DB_POSTGRESDB_PASSWORD="{{ .Data.data.password }}"
          {{- end }}
          {{- with secret "secret/data/n8n/redis" -}}
          export QUEUE_BULL_REDIS_PASSWORD="{{ .Data.data.password }}"
          {{- end }}
          {{- with secret "secret/data/n8n/smtp" -}}
          export N8N_SMTP_HOST="{{ .Data.data.host }}"
          export N8N_SMTP_PORT="{{ .Data.data.port }}"
          export N8N_SMTP_USER="{{ .Data.data.user }}"
          export N8N_SMTP_PASS="{{ .Data.data.password }}"
          export N8N_SMTP_SENDER="{{ .Data.data.from }}"
          {{- end }}
          {{- with secret "secret/data/n8n/llm" -}}
          export LLM_API_KEY="{{ .Data.data.api_key }}"
          export LLM_PROVIDER="{{ .Data.data.provider }}"
          {{- end }}
        vault.hashicorp.com/agent-inject-file-n8n-env: "n8n.env"

        # Keep secrets fresh (non-init mode)
        vault.hashicorp.com/agent-pre-populate-only: "false"
        vault.hashicorp.com/agent-revoke-on-shutdown: "true"
    spec:
      serviceAccountName: n8n-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      initContainers:
        # Wait for Vault Agent to write /vault/secrets/n8n.env
        - name: wait-for-vault-secrets
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Vault secrets..."
              until [ -f /vault/secrets/n8n.env ]; do sleep 2; done
              echo "Vault secrets ready."
          volumeMounts:
            - name: vault-secrets
              mountPath: /vault/secrets

        # Wait for PostgreSQL
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-service.n8n.svc.cluster.local 5432; do
                echo "Waiting for postgres..."; sleep 3
              done
              echo "Postgres is up."

        # Wait for Redis
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis-service.n8n.svc.cluster.local 6379; do
                echo "Waiting for redis..."; sleep 3
              done
              echo "Redis is up."

      containers:
        - name: n8n
          image: n8nio/n8n:latest
          command:
            - sh
            - -c
            - |
              set -a
              . /vault/secrets/n8n.env
              set +a
              exec n8n start
          ports:
            - containerPort: 5678
              name: http
          envFrom:
            - configMapRef:
                name: n8n-config
          env:
            # Queue mode: this pod handles webhooks + UI
            - name: N8N_SKIP_WEBHOOK_DEREGISTRATION_SHUTDOWN
              value: "true"
          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n
            - name: vault-secrets
              mountPath: /vault/secrets
              readOnly: true
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 30
            periodSeconds: 10

      volumes:
        - name: n8n-data
          persistentVolumeClaim:
            claimName: n8n-data-pvc
        - name: vault-secrets
          emptyDir:
            medium: Memory
---
apiVersion: v1
kind: Service
metadata:
  name: n8n-service
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/part-of: n8n
spec:
  selector:
    app: n8n
    component: main
  ports:
    - port: 80
      targetPort: 5678
      name: http
  type: ClusterIP
