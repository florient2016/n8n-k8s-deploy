---
# =============================================================================
# n8n ConfigMap - non-sensitive configuration
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: n8n-config
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/component: config
data:
  # ---- General ----
  N8N_HOST: "n8n.yourdomain.com"          # CHANGE THIS
  N8N_PORT: "5678"
  N8N_PROTOCOL: "https"
  WEBHOOK_URL: "https://n8n.yourdomain.com"  # CHANGE THIS
  GENERIC_TIMEZONE: "Europe/Berlin"          # CHANGE THIS to your timezone
  TZ: "Europe/Berlin"                        # CHANGE THIS

  # ---- Execution mode: queue ----
  EXECUTIONS_MODE: "queue"
  QUEUE_BULL_REDIS_HOST: "n8n-redis-svc.n8n.svc.cluster.local"
  QUEUE_BULL_REDIS_PORT: "6379"

  # ---- Database ----
  DB_TYPE: "postgresdb"
  DB_POSTGRESDB_HOST: "n8n-postgres-svc.n8n.svc.cluster.local"
  DB_POSTGRESDB_PORT: "5432"
  DB_POSTGRESDB_DATABASE: "n8n"
  DB_POSTGRESDB_USER: "n8n"

  # ---- Email (SMTP) ----
  N8N_EMAIL_MODE: "smtp"
  N8N_SMTP_HOST: "smtp.gmail.com"           # CHANGE THIS if not Gmail
  N8N_SMTP_PORT: "587"
  N8N_SMTP_SSL: "false"
  N8N_SMTP_STARTTLS: "true"
  N8N_SMTP_SENDER: "your-email@gmail.com"   # CHANGE THIS
  N8N_SMTP_USER: "your-email@gmail.com"     # CHANGE THIS

  # ---- n8n settings ----
  N8N_USER_FOLDER: "/home/node/.n8n"
  N8N_LOG_LEVEL: "info"
  N8N_LOG_OUTPUT: "console"
  EXECUTIONS_DATA_PRUNE: "true"
  EXECUTIONS_DATA_MAX_AGE: "168"           # 7 days in hours
  N8N_METRICS: "true"
  N8N_HIRING_BANNER_ENABLED: "false"
  N8N_VERSION_NOTIFICATIONS_ENABLED: "true"

  # ---- Worker settings ----
  QUEUE_BULL_REDIS_TIMEOUT_THRESHOLD: "10000"
  N8N_GRACEFUL_SHUTDOWN_TIMEOUT: "30"

---
# =============================================================================
# n8n Main Deployment (webhook + UI server)
# Vault Agent injects all secrets at runtime via emptyDir volume
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-main
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/instance: n8n-main
    app.kubernetes.io/component: main
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n-main
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: n8n-main
        app.kubernetes.io/name: n8n
        app.kubernetes.io/component: main
      annotations:
        # ---------------------------------------------------------------
        # Vault Agent Injector - injects ALL secrets as env-formatted files
        # ---------------------------------------------------------------
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "n8n"

        # n8n core secrets
        vault.hashicorp.com/agent-inject-secret-core: "secret/data/n8n/core"
        vault.hashicorp.com/agent-inject-template-core: |
          {{- with secret "secret/data/n8n/core" -}}
          export N8N_ENCRYPTION_KEY="{{ .Data.data.encryption_key }}"
          {{- end }}
        vault.hashicorp.com/agent-inject-file-core: "n8n-core-env"

        # PostgreSQL secrets
        vault.hashicorp.com/agent-inject-secret-postgres: "secret/data/n8n/postgres"
        vault.hashicorp.com/agent-inject-template-postgres: |
          {{- with secret "secret/data/n8n/postgres" -}}
          export DB_POSTGRESDB_PASSWORD="{{ .Data.data.password }}"
          {{- end }}
        vault.hashicorp.com/agent-inject-file-postgres: "n8n-postgres-env"

        # Redis secrets
        vault.hashicorp.com/agent-inject-secret-redis: "secret/data/n8n/redis"
        vault.hashicorp.com/agent-inject-template-redis: |
          {{- with secret "secret/data/n8n/redis" -}}
          export QUEUE_BULL_REDIS_PASSWORD="{{ .Data.data.password }}"
          {{- end }}
        vault.hashicorp.com/agent-inject-file-redis: "n8n-redis-env"

        # SMTP secrets
        vault.hashicorp.com/agent-inject-secret-smtp: "secret/data/n8n/smtp"
        vault.hashicorp.com/agent-inject-template-smtp: |
          {{- with secret "secret/data/n8n/smtp" -}}
          export N8N_SMTP_PASS="{{ .Data.data.password }}"
          {{- end }}
        vault.hashicorp.com/agent-inject-file-smtp: "n8n-smtp-env"

        # LLM API Key
        vault.hashicorp.com/agent-inject-secret-llm: "secret/data/n8n/llm"
        vault.hashicorp.com/agent-inject-template-llm: |
          {{- with secret "secret/data/n8n/llm" -}}
          export LLM_API_KEY="{{ .Data.data.api_key }}"
          {{- end }}
        vault.hashicorp.com/agent-inject-file-llm: "n8n-llm-env"

        vault.hashicorp.com/agent-pre-populate-only: "false"
        vault.hashicorp.com/agent-revoke-on-shutdown: "true"

    spec:
      serviceAccountName: n8n-sa
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        # Wait for PostgreSQL to be ready before starting n8n
        - name: wait-for-postgres
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for PostgreSQL..."
              until nc -z n8n-postgres-svc 5432; do
                sleep 2
              done
              echo "PostgreSQL is ready."
        # Wait for Redis to be ready
        - name: wait-for-redis
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for Redis..."
              until nc -z n8n-redis-svc 6379; do
                sleep 2
              done
              echo "Redis is ready."
      containers:
        - name: n8n
          image: n8nio/n8n:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              # Source all Vault-injected secret files
              for f in /vault/secrets/n8n-*-env; do
                [ -f "$f" ] && source "$f"
              done
              # Start n8n
              exec n8n start
          ports:
            - containerPort: 5678
              name: http
          envFrom:
            - configMapRef:
                name: n8n-config
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n
            - name: vault-secrets
              mountPath: /vault/secrets
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: n8n-data
          persistentVolumeClaim:
            claimName: n8n-data-pvc
        - name: vault-secrets
          emptyDir:
            medium: Memory

---
# =============================================================================
# n8n Service (ClusterIP - exposed via Ingress)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: n8n-svc
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/instance: n8n-main
    app.kubernetes.io/component: main
spec:
  selector:
    app: n8n-main
  ports:
    - name: http
      port: 5678
      targetPort: 5678
  type: ClusterIP