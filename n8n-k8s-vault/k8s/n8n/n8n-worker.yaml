---
# n8n Worker Deployment
# Workers pull jobs from Redis and execute them.
# Secrets injected identically to the main pod.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-worker
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: n8n
spec:
  replicas: 2       # scale as needed
  selector:
    matchLabels:
      app: n8n
      component: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: n8n
        component: worker
        app.kubernetes.io/name: n8n
        app.kubernetes.io/part-of: n8n
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "n8n-role"
        vault.hashicorp.com/agent-inject-secret-n8n-env: "secret/data/n8n/encryption"
        vault.hashicorp.com/agent-inject-template-n8n-env: |
          {{- with secret "secret/data/n8n/encryption" -}}
          export N8N_ENCRYPTION_KEY="{{ .Data.data.key }}"
          {{- end }}
          {{- with secret "secret/data/n8n/postgres" -}}
          export DB_POSTGRESDB_PASSWORD="{{ .Data.data.password }}"
          {{- end }}
          {{- with secret "secret/data/n8n/redis" -}}
          export QUEUE_BULL_REDIS_PASSWORD="{{ .Data.data.password }}"
          {{- end }}
          {{- with secret "secret/data/n8n/smtp" -}}
          export N8N_SMTP_HOST="{{ .Data.data.host }}"
          export N8N_SMTP_PORT="{{ .Data.data.port }}"
          export N8N_SMTP_USER="{{ .Data.data.user }}"
          export N8N_SMTP_PASS="{{ .Data.data.password }}"
          export N8N_SMTP_SENDER="{{ .Data.data.from }}"
          {{- end }}
          {{- with secret "secret/data/n8n/llm" -}}
          export LLM_API_KEY="{{ .Data.data.api_key }}"
          export LLM_PROVIDER="{{ .Data.data.provider }}"
          {{- end }}
        vault.hashicorp.com/agent-inject-file-n8n-env: "n8n.env"
        vault.hashicorp.com/agent-pre-populate-only: "false"
        vault.hashicorp.com/agent-revoke-on-shutdown: "true"
    spec:
      serviceAccountName: n8n-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      initContainers:
        - name: wait-for-vault-secrets
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until [ -f /vault/secrets/n8n.env ]; do
                echo "Waiting for Vault secrets..."; sleep 2
              done
          volumeMounts:
            - name: vault-secrets
              mountPath: /vault/secrets

        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-service.n8n.svc.cluster.local 5432; do sleep 3; done

        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis-service.n8n.svc.cluster.local 6379; do sleep 3; done

      containers:
        - name: n8n-worker
          image: n8nio/n8n:latest
          command:
            - sh
            - -c
            - |
              set -a
              . /vault/secrets/n8n.env
              set +a
              exec n8n worker
          envFrom:
            - configMapRef:
                name: n8n-config
          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n
            - name: vault-secrets
              mountPath: /vault/secrets
              readOnly: true
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            exec:
              command: ["pgrep", "-f", "n8n worker"]
            initialDelaySeconds: 30
            periodSeconds: 30

      volumes:
        - name: n8n-data
          persistentVolumeClaim:
            claimName: n8n-data-pvc
        - name: vault-secrets
          emptyDir:
            medium: Memory
---
# HorizontalPodAutoscaler for workers
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: n8n-worker-hpa
  namespace: n8n
  labels:
    app.kubernetes.io/part-of: n8n
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: n8n-worker
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
