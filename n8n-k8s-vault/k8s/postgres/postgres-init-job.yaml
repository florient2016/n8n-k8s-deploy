---
# ConfigMap holding the DB init SQL
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-sql
  namespace: n8n
  labels:
    app.kubernetes.io/part-of: n8n
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS article_topics (
        id            SERIAL PRIMARY KEY,
        topic         TEXT        NOT NULL,
        notes         TEXT,
        status        VARCHAR(20) NOT NULL DEFAULT 'pending'
                      CHECK (status IN ('pending', 'processing', 'done', 'error')),
        priority      SMALLINT    NOT NULL DEFAULT 5,
        created_at    TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        scheduled_at  TIMESTAMPTZ,
        processed_at  TIMESTAMPTZ,
        error_msg     TEXT,
        article_title TEXT,
        article_url   TEXT,
        email_sent    BOOLEAN     NOT NULL DEFAULT FALSE,
        retry_count   SMALLINT    NOT NULL DEFAULT 0
    );

    CREATE INDEX IF NOT EXISTS idx_topics_status_priority
        ON article_topics (status, priority, created_at);

    CREATE TABLE IF NOT EXISTS workflow_runs (
        id            SERIAL PRIMARY KEY,
        topic_id      INTEGER     REFERENCES article_topics(id),
        run_at        TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        status        VARCHAR(20) NOT NULL DEFAULT 'started'
                      CHECK (status IN ('started', 'success', 'error')),
        duration_ms   INTEGER,
        error_msg     TEXT,
        n8n_exec_id   TEXT
    );
---
# One-shot Kubernetes Job that runs the init SQL
apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-init
  namespace: n8n
  labels:
    app.kubernetes.io/name: postgres-init
    app.kubernetes.io/part-of: n8n
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "1"
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: postgres-init
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "n8n-role"
        vault.hashicorp.com/agent-inject-secret-postgres: "secret/data/n8n/postgres"
        vault.hashicorp.com/agent-inject-template-postgres: |
          {{- with secret "secret/data/n8n/postgres" -}}
          export PGPASSWORD="{{ .Data.data.password }}"
          export PGUSER="n8n"
          export PGHOST="postgres-service.n8n.svc.cluster.local"
          export PGDATABASE="n8n"
          {{- end }}
        vault.hashicorp.com/agent-pre-populate-only: "true"
    spec:
      serviceAccountName: n8n-sa
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for postgres..."
              until nc -z postgres-service.n8n.svc.cluster.local 5432; do
                sleep 3
              done
              echo "Postgres is up"
      containers:
        - name: psql-init
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              set -a
              . /vault/secrets/postgres
              set +a
              psql -f /sql/init.sql
          volumeMounts:
            - name: init-sql
              mountPath: /sql
            - name: vault-secrets
              mountPath: /vault/secrets
      volumes:
        - name: init-sql
          configMap:
            name: postgres-init-sql
        - name: vault-secrets
          emptyDir:
            medium: Memory
