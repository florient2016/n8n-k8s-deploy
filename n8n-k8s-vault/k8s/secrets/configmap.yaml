---
# ConfigMap: non-sensitive n8n configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: n8n-config
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/part-of: n8n
data:
  # General
  GENERIC_TIMEZONE: "Europe/Berlin"
  N8N_PROTOCOL: "https"
  N8N_HOST: "n8n.yourdomain.com"           # ← replace with your domain
  WEBHOOK_URL: "https://n8n.yourdomain.com/" # ← replace with your domain
  N8N_PORT: "5678"
  N8N_METRICS: "true"

  # Execution mode (queue)
  EXECUTIONS_MODE: "queue"
  QUEUE_BULL_REDIS_TIMEOUT_THRESHOLD: "180"

  # Database
  DB_TYPE: "postgresdb"
  DB_POSTGRESDB_DATABASE: "n8n"
  DB_POSTGRESDB_HOST: "postgres-service.n8n.svc.cluster.local"
  DB_POSTGRESDB_PORT: "5432"
  DB_POSTGRESDB_USER: "n8n"
  DB_POSTGRESDB_SCHEMA: "public"

  # Logging
  N8N_LOG_LEVEL: "info"
  N8N_LOG_OUTPUT: "console"

  # Security
  N8N_DIAGNOSTICS_ENABLED: "false"
  N8N_VERSION_NOTIFICATIONS_ENABLED: "true"
  N8N_TEMPLATES_ENABLED: "true"

  # Workers
  N8N_CONCURRENCY_PRODUCTION_LIMIT: "10"

  # Email (host/port/user come from Vault; password injected at runtime)
  N8N_EMAIL_MODE: "smtp"

  # Paths
  N8N_USER_FOLDER: "/home/node/.n8n"
