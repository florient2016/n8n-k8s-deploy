---
# ConfigMap holding Vault Agent template configurations.
# These are referenced by the Vault Agent sidecar annotations on each deployment.
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-agent-templates
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/part-of: n8n
data:
  # Template rendered to /vault/secrets/n8n.env
  # The n8n container sources this file via an init-container or command wrapper.
  n8n-env.tmpl: |
    {{- with secret "secret/data/n8n/encryption" -}}
    N8N_ENCRYPTION_KEY={{ .Data.data.key }}
    {{- end }}

    {{- with secret "secret/data/n8n/postgres" -}}
    DB_POSTGRESDB_PASSWORD={{ .Data.data.password }}
    {{- end }}

    {{- with secret "secret/data/n8n/redis" -}}
    QUEUE_BULL_REDIS_PASSWORD={{ .Data.data.password }}
    {{- end }}

    {{- with secret "secret/data/n8n/smtp" -}}
    N8N_SMTP_HOST={{ .Data.data.host }}
    N8N_SMTP_PORT={{ .Data.data.port }}
    N8N_SMTP_USER={{ .Data.data.user }}
    N8N_SMTP_PASS={{ .Data.data.password }}
    N8N_SMTP_SENDER={{ .Data.data.from }}
    {{- end }}

    {{- with secret "secret/data/n8n/llm" -}}
    LLM_API_KEY={{ .Data.data.api_key }}
    LLM_PROVIDER={{ .Data.data.provider }}
    {{- end }}

  postgres-env.tmpl: |
    {{- with secret "secret/data/n8n/postgres" -}}
    POSTGRES_PASSWORD={{ .Data.data.password }}
    {{- end }}

  redis-env.tmpl: |
    {{- with secret "secret/data/n8n/redis" -}}
    REDIS_PASSWORD={{ .Data.data.password }}
    {{- end }}
