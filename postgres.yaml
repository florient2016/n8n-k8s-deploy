---
# =============================================================================
# n8n PostgreSQL ConfigMap — Non-sensitive configuration
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: n8n-postgres-config
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/component: postgres
data:
  POSTGRES_DB: "n8n"
  PGDATA: "/var/lib/postgresql/data/pgdata"

---
# =============================================================================
# n8n PostgreSQL Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: n8n-postgres
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/component: postgres
spec:
  selector:
    app: n8n-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  clusterIP: None   # Headless for StatefulSet DNS

---
# =============================================================================
# n8n PostgreSQL StatefulSet
# Vault Agent sidecar injects secrets at /vault/secrets/
# An init container renders the postgres password env file
# =============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: n8n-postgres
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/component: postgres
spec:
  serviceName: n8n-postgres
  replicas: 1
  selector:
    matchLabels:
      app: n8n-postgres
  template:
    metadata:
      labels:
        app: n8n-postgres
        app.kubernetes.io/name: n8n
        app.kubernetes.io/component: postgres
      annotations:
        # ── Vault Agent Injector annotations ──────────────────────────────────
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "n8n"
        vault.hashicorp.com/agent-inject-secret-postgres: "secret/data/n8n/postgres"
        vault.hashicorp.com/agent-inject-template-postgres: |
          {{- with secret "secret/data/n8n/postgres" -}}
          export POSTGRES_USER="{{ .Data.data.POSTGRES_USER }}"
          export POSTGRES_PASSWORD="{{ .Data.data.POSTGRES_PASSWORD }}"
          export POSTGRES_DB="{{ .Data.data.POSTGRES_DB }}"
          {{- end }}
        vault.hashicorp.com/agent-pre-populate-only: "true"
    spec:
      serviceAccountName: n8n-sa
      initContainers:
        # Source the Vault-injected secrets file to populate env
        - name: vault-secret-init
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              cp /vault/secrets/postgres /docker-entrypoint-initdb.d/00-vault-env.sh
              chmod +x /docker-entrypoint-initdb.d/00-vault-env.sh
          volumeMounts:
            - name: vault-secrets
              mountPath: /vault/secrets
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
      containers:
        - name: postgres
          image: postgres:15-alpine
          envFrom:
            - configMapRef:
                name: n8n-postgres-config
          env:
            # Read from Vault-injected file via wrapper script
            - name: POSTGRES_PASSWORD_FILE
              value: /vault/secrets/postgres-pass
          command:
            - /bin/sh
            - -c
            - |
              # Source Vault env exports
              . /vault/secrets/postgres
              exec docker-entrypoint.sh postgres
          ports:
            - containerPort: 5432
              name: postgres
          volumeMounts:
            - name: n8n-postgres-data
              mountPath: /var/lib/postgresql/data
            - name: vault-secrets
              mountPath: /vault/secrets
              readOnly: true
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "n8n", "-d", "n8n"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "n8n", "-d", "n8n"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: n8n-postgres-data
          persistentVolumeClaim:
            claimName: n8n-postgres-pvc
        - name: vault-secrets
          emptyDir: {}
        - name: init-scripts
          emptyDir: {}
