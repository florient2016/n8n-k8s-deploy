---
# =============================================================================
# PostgreSQL ConfigMap - init scripts
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: n8n-postgres-init
  namespace: n8n
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: n8n-postgres
data:
  init.sql: |
    -- Create n8n database and user (password set via env from Vault)
    CREATE DATABASE n8n;
    CREATE USER n8n WITH ENCRYPTED PASSWORD :'POSTGRES_PASSWORD';
    GRANT ALL PRIVILEGES ON DATABASE n8n TO n8n;
    ALTER USER n8n CREATEDB;

    -- Topic queue table for the automation workflow
    \connect n8n
    
    CREATE TABLE IF NOT EXISTS article_topics (
        id          SERIAL PRIMARY KEY,
        topic       TEXT        NOT NULL,
        status      VARCHAR(20) NOT NULL DEFAULT 'pending',
        created_at  TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        scheduled_at TIMESTAMPTZ,
        processed_at TIMESTAMPTZ,
        article_url TEXT,
        error_msg   TEXT,
        retry_count INT         NOT NULL DEFAULT 0,
        CONSTRAINT status_check CHECK (status IN ('pending','processing','done','failed'))
    );
    
    CREATE INDEX idx_topics_status    ON article_topics(status);
    CREATE INDEX idx_topics_created   ON article_topics(created_at);
    CREATE INDEX idx_topics_scheduled ON article_topics(scheduled_at);
    
    COMMENT ON TABLE  article_topics IS 'Queue of article topics for n8n scheduled publishing';
    COMMENT ON COLUMN article_topics.status IS 'pending|processing|done|failed';

---
# =============================================================================
# PostgreSQL Deployment
# Vault Agent sidecar injects DB password at runtime via annotation
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-postgres
  namespace: n8n
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: n8n-postgres
    app.kubernetes.io/component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n-postgres
  strategy:
    type: Recreate        # Required for single-node PVC
  template:
    metadata:
      labels:
        app: n8n-postgres
        app.kubernetes.io/name: postgres
        app.kubernetes.io/component: database
      annotations:
        # ---------------------------------------------------------------
        # Vault Agent Injector annotations
        # ---------------------------------------------------------------
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "n8n"
        vault.hashicorp.com/agent-inject-secret-postgres: "secret/data/n8n/postgres"
        vault.hashicorp.com/agent-inject-template-postgres: |
          {{- with secret "secret/data/n8n/postgres" -}}
          export POSTGRES_PASSWORD="{{ .Data.data.password }}"
          export PGPASSWORD="{{ .Data.data.password }}"
          {{- end }}
        vault.hashicorp.com/agent-pre-populate-only: "true"
        vault.hashicorp.com/agent-inject-file-postgres: "postgres-env"
    spec:
      serviceAccountName: n8n-sa
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      initContainers:
        # Source Vault-injected env file before init
        - name: vault-env-sourcer
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              while [ ! -f /vault/secrets/postgres-env ]; do
                echo "Waiting for Vault secrets..."
                sleep 2
              done
              echo "Vault secrets ready."
          volumeMounts:
            - name: vault-secrets
              mountPath: /vault/secrets
      containers:
        - name: postgres
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              source /vault/secrets/postgres-env
              exec docker-entrypoint.sh postgres
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: "n8n"
            - name: POSTGRES_USER
              value: "n8n"
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          volumeMounts:
            - name: n8n-postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
            - name: vault-secrets
              mountPath: /vault/secrets
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "n8n", "-d", "n8n"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "n8n", "-d", "n8n"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: n8n-postgres-data
          persistentVolumeClaim:
            claimName: n8n-postgres-pvc
        - name: init-scripts
          configMap:
            name: n8n-postgres-init
        - name: vault-secrets
          emptyDir:
            medium: Memory    # Keep secrets in RAM only

---
# =============================================================================
# PostgreSQL Service (ClusterIP - internal only)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: n8n-postgres-svc
  namespace: n8n
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: n8n-postgres
    app.kubernetes.io/component: database
spec:
  selector:
    app: n8n-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  type: ClusterIP