---
# =============================================================================
# PostgreSQL ConfigMap — init SQL (creates n8n DB, user, topic queue table)
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: n8n-postgres-init
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n-postgres
data:
  01-init.sh: |
    #!/bin/bash
    set -e
    # POSTGRES_PASSWORD is exported by the entrypoint wrapper below
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
      CREATE TABLE IF NOT EXISTS article_topics (
          id           SERIAL PRIMARY KEY,
          topic        TEXT        NOT NULL,
          status       VARCHAR(20) NOT NULL DEFAULT 'pending',
          created_at   TIMESTAMPTZ NOT NULL DEFAULT NOW(),
          scheduled_at TIMESTAMPTZ,
          processed_at TIMESTAMPTZ,
          article_url  TEXT,
          error_msg    TEXT,
          retry_count  INT         NOT NULL DEFAULT 0,
          CONSTRAINT   status_chk  CHECK (status IN ('pending','processing','done','failed'))
      );
      CREATE INDEX IF NOT EXISTS idx_topics_status  ON article_topics(status);
      CREATE INDEX IF NOT EXISTS idx_topics_created ON article_topics(created_at);
    EOSQL

---
# =============================================================================
# PostgreSQL Deployment
# - Vault Agent injects password into /vault/secrets/pg-env
# - Entrypoint wrapper sources the file before running postgres
# - NO DNS hostnames used for self-reference; pod uses localhost
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-postgres
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n-postgres
    app.kubernetes.io/component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n-postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: n8n-postgres
        app.kubernetes.io/name: n8n-postgres
      annotations:
        # ------------------------------------------------------------------
        # Vault Agent Injector annotations
        # ------------------------------------------------------------------
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "n8n"
        vault.hashicorp.com/agent-pre-populate-only: "true"
        # Render postgres password as a shell-sourceable env file
        vault.hashicorp.com/agent-inject-secret-pg: "secret/data/n8n/postgres"
        vault.hashicorp.com/agent-inject-file-pg: "pg-env"
        vault.hashicorp.com/agent-inject-template-pg: |
          {{- with secret "secret/data/n8n/postgres" -}}
          export POSTGRES_PASSWORD="{{ .Data.data.password }}"
          {{- end }}
    spec:
      serviceAccountName: n8n-sa
      # Run as root so postgres can manage /n8n/postgres ownership
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          # Source Vault env file then hand off to the real entrypoint
          command: ["/bin/sh", "-c"]
          args:
            - |
              # Wait for Vault agent to write the secret file
              for i in $(seq 1 30); do
                [ -f /vault/secrets/pg-env ] && break
                echo "Waiting for Vault secret... ($i)"
                sleep 2
              done
              source /vault/secrets/pg-env
              exec docker-entrypoint.sh postgres
          env:
            - name: POSTGRES_DB
              value: "n8n"
            - name: POSTGRES_USER
              value: "n8n"
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          volumeMounts:
            - name: n8n-postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
            - name: vault-secrets
              mountPath: /vault/secrets
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "n8n", "-d", "n8n"]
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "n8n", "-d", "n8n"]
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 5
      volumes:
        - name: n8n-postgres-data
          persistentVolumeClaim:
            claimName: n8n-postgres-pvc
        - name: init-scripts
          configMap:
            name: n8n-postgres-init
            defaultMode: 0755
        - name: vault-secrets
          emptyDir:
            medium: Memory

---
# =============================================================================
# PostgreSQL Service — ClusterIP
# Other pods connect using the ClusterIP, not DNS, per user requirement.
# After apply: kubectl get svc n8n-postgres-svc -n n8n -o jsonpath='{.spec.clusterIP}'
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: n8n-postgres-svc
  namespace: n8n
  labels:
    app.kubernetes.io/name: n8n-postgres
    app.kubernetes.io/component: database
spec:
  selector:
    app: n8n-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  type: ClusterIP
